name: CI/CD — Transaction Lab

on:
  push:
    branches: [main]
    paths:
      - 'transaction-lab/**'
  pull_request:
    branches: [main]
    paths:
      - 'transaction-lab/**'

jobs:

  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: transactionlab_test
          POSTGRES_USER: txlab
          POSTGRES_PASSWORD: txlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        working-directory: transaction-lab/backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/transactionlab_test
          DB_USER: txlab
          DB_PASS: txlab
          KAFKA_BROKERS: localhost:9092
        run: ./mvnw test
      - name: Build JAR
        working-directory: transaction-lab/backend
        run: ./mvnw package -DskipTests

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: transaction-lab/frontend/package-lock.json
      - name: Install dependencies
        working-directory: transaction-lab/frontend
        run: npm ci
      - name: Build production
        working-directory: transaction-lab/frontend
        run: npx ng build --configuration production

  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: transaction-lab/frontend
          vercel-args: '--prod'

  deploy-backend:
    name: Deploy Backend → Railway
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        working-directory: transaction-lab/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service transaction-lab-api
