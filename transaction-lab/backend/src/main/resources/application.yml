# ─────────────────────────────────────────────────────────
# Transaction Lab — Configuration Spring Boot
# ─────────────────────────────────────────────────────────

spring:
  application:
    name: transaction-lab

  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads — un thread par requête HTTP

  # ── Datasource principale (PostgreSQL) ─────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transactionlab}
    username: ${DB_USER:txlab}
    password: ${DB_PASS:txlab}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # schema géré par init.sql
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    enabled: false
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                   # garantie de durabilité
      retries: 3
    consumer:
      group-id: transaction-lab
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false   # commit manuel pour garantir l'idempotence
      properties:
        spring.json.trusted.packages: "com.klanik.transactionlab.*"
    listener:
      ack-mode: MANUAL_IMMEDIATE

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Swagger / OpenAPI ──────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    com.klanik.transactionlab: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: WARN

# ─────────────────────────────────────────────────────────
# Profil PROD (Railway)
# ─────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_URL}
    producer:
      properties:
        sasl.mechanism: SCRAM-SHA-256
        security.protocol: SASL_SSL
        sasl.jaas.config: >
          org.apache.kafka.common.security.scram.ScramLoginModule required
          username="${KAFKA_USERNAME}"
          password="${KAFKA_PASSWORD}";
    consumer:
      properties:
        sasl.mechanism: SCRAM-SHA-256
        security.protocol: SASL_SSL
        sasl.jaas.config: >
          org.apache.kafka.common.security.scram.ScramLoginModule required
          username="${KAFKA_USERNAME}"
          password="${KAFKA_PASSWORD}";

logging:
  level:
    com.klanik.transactionlab: INFO
