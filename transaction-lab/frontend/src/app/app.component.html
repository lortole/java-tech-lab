<div class="app-shell">

  <header class="app-header">
    <div class="header-left">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M9 3h6v2H9V3zm-1 4h8l1 10H7L8 7zm3 3v4h2v-4h-2z"
              fill="currentColor"/>
      </svg>
      <div class="header-titles">
        <h1 class="header-title">Transaction Lab</h1>
        <span class="header-subtitle">ACID &middot; CAP &middot; SAGA &middot; BASE &mdash; by Lo&iuml;c ORTOL&Eacute; &middot; Klanik</span>
      </div>
    </div>
    <div class="header-right">
      <a href="https://github.com/lortole/java-tech-lab" target="_blank" class="header-link">
        GitHub
      </a>
      <app-theme-toggle />
    </div>
  </header>

  <nav class="tabs-nav">
    @for (tab of tabs; track tab.id) {
      <button
        class="tab-btn"
        [class]="tab.color"
        [class.active]="activeTab() === tab.id"
        (click)="setTab(tab.id)">
        {{ tab.label }}
      </button>
    }
  </nav>

  <main class="tab-content">
    @switch (activeTab()) {
      @case ('home') { <app-home /> }
      @case ('acid') { <app-acid /> }
      @case ('cap')  { <app-cap  /> }
      @case ('saga') { <app-saga /> }
      @case ('base') { <app-base /> }
    }
  </main>

</div>
